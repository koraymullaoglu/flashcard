<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Flashcard - Kartlarla öğrenmenin en kolay yolu">
    <title>{% block title %}Flashcard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Card flip animation */
        .card-inner {
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        /* Fade-in animation */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out forwards;
        }

        /* Slide-up for modals */
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-slide-up {
            animation: slide-up 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 font-sans antialiased">
    <!-- Navigation -->
    <nav class="border-b border-zinc-800/60" data-testid="navbar">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-zinc-100 hover:text-white transition-colors" data-testid="nav-logo">
                <svg class="w-5 h-5 text-violet-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L12 12.75 6.429 9.75m11.142 0 4.179 2.25-9.75 5.25-9.75-5.25 4.179-2.25"/>
                </svg>
                <span class="font-semibold text-sm tracking-tight">Flashcard</span>
            </a>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-3" data-testid="nav-links">
                    <a href="/" class="text-xs text-zinc-400 hover:text-zinc-200 transition-colors px-2.5 py-1.5 rounded-md hover:bg-zinc-800/50" data-testid="nav-decks">
                        Desteler
                    </a>
                </div>
                <div class="flex items-center gap-2" id="auth-controls" data-testid="auth-controls">
                <a href="/auth" id="nav-login" data-testid="nav-login"
                   class="text-xs text-zinc-400 hover:text-zinc-200 transition-colors px-2.5 py-1.5 rounded-md hover:bg-zinc-800/50">
                    Giriş
                </a>
                <span id="nav-user" data-testid="nav-user" class="hidden text-xs text-zinc-400 px-2.5 py-1.5"></span>
                <button id="nav-logout" data-testid="nav-logout" onclick="logout()"
                    class="hidden text-xs text-zinc-500 hover:text-zinc-300 transition-colors px-2.5 py-1.5 rounded-md hover:bg-zinc-800/50">
                    Çıkış
                </button>
            </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        /* ===== Auth Helpers ===== */
        const AUTH_KEY = 'flashcard_token';

        function getToken() { return localStorage.getItem(AUTH_KEY); }
        function setToken(t) { localStorage.setItem(AUTH_KEY, t); }
        function clearToken() { localStorage.removeItem(AUTH_KEY); }

        function authHeaders() {
            const t = getToken();
            return t ? { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
        }

        function getAuthHeaders() {
            const t = getToken();
            return t ? { 'Authorization': `Bearer ${t}` } : {};
        }

        function logout() {
            clearToken();
            window.location = '/auth';
        }

        (function updateNav() {
            const token = getToken();
            const $login  = document.getElementById('nav-login');
            const $user   = document.getElementById('nav-user');
            const $logout = document.getElementById('nav-logout');

            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const username = payload.usr || payload.sub;
                    if ($login)  $login.classList.add('hidden');
                    if ($user)   { $user.textContent = username; $user.classList.remove('hidden'); }
                    if ($logout) $logout.classList.remove('hidden');
                } catch (_) {
                    clearToken();
                }
            }
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
