name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q -m "not browser"

  browser-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run browser tests
        run: uv run pytest tests/e2e/ -m browser -v --browser chromium

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/

  postman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync dependencies
        run: uv sync

      - name: Install Newman
        run: npm install -g newman

      - name: Initialize database
        env:
          DATABASE_URL: sqlite:////tmp/flashcard-postman.db
          SECRET_KEY: ci-secret-key
          JWT_SECRET: ci-jwt-secret-at-least-32-bytes
        run: uv run flask --app app init-db

      - name: Start API server
        env:
          DATABASE_URL: sqlite:////tmp/flashcard-postman.db
          SECRET_KEY: ci-secret-key
          JWT_SECRET: ci-jwt-secret-at-least-32-bytes
        run: |
          uv run flask --app app run --host=127.0.0.1 --port=5000 > /tmp/flashcard-postman.log 2>&1 &
          echo $! > /tmp/flashcard-postman.pid

      - name: Wait for API server
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5000/health; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/flashcard-postman.log
          exit 1

      - name: Run Postman collection with Newman
        run: newman run postman/flashcard-api.postman_collection.json -e postman/flashcard-local.postman_environment.json --bail

      - name: Print API logs on failure
        if: failure()
        run: cat /tmp/flashcard-postman.log

      - name: Stop API server
        if: always()
        run: kill "$(cat /tmp/flashcard-postman.pid)"

  docker:
    runs-on: ubuntu-latest
    needs: [test, browser-tests, postman]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set Docker image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          set -euo pipefail

          container=""
          cleanup() {
            if [ -n "$container" ]; then
              docker rm -f "$container" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          container=$(docker run --rm -d \
            -p 127.0.0.1:5001:5000 \
            -e DATABASE_URL=sqlite:////tmp/flashcard.db \
            ${{ steps.image.outputs.name }}:${{ github.sha }})

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5001/health; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container"
          exit 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
